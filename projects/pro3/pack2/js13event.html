<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function func1() {
            document.getElementById("show").innerHTML = "전통적인 이벤트 처리"
        }

        let a = 10;
        let b = {
            funcNew1:function(){
                document.getElementById("show").innerHTML = "b 객체의 메소드 처리";
            },
            functNew2:function(){
                document.getElementById("show").innerHTML = "<h1>b 객체의 멤버 수행</h1>";
            }
        }
    </script>

    <script>
        window.onload = function() {    // 서버로부터 문서 수신이 완료되면 함수 수행(1회용, 초기화 담당, callback function)
            // alert("ok");
            const exBtn1 = document.getElementById("btn1");  // 특정 버튼을 읽어 변수에 기억
            exBtn1.onclick = function() {   // 이벤트 장착
                document.getElementById("show").innerHTML = "클릭 1 처리";
            }
            
            const exBtn2 = document.getElementsByName("myBtn"); // 배열에 기억
            console.log(exBtn2.length)
            exBtn2[0].onclick = function() {
                document.getElementById("show").innerHTML = "<i>클릭 2 누름</i>";
            }
            exBtn2[1].onclick = function() {
                document.getElementById("show").innerHTML = "<i>클릭 3 누름</i>";
            }

            const exBtn4 = document.getElementsByTagName("button")[3];
            exBtn4.onclick = function() {
                document.getElementById("show").innerHTML = "<b>클릭 4 선택함</b>";
            }

            // 이벤트 연결 및 해제
            // .addEventListener("이벤트종료", 핸들러함수)
            // 장점 : 연결, 해제가 가능함
            document.getElementById("btn5").addEventListener("click", abcFunc);     // 이벤트 연결       
        }

        function abcFunc() {
            document.getElementById("show").innerHTML = "클릭 5 이벤트 연결 처리";
            document.getElementById("btn5").removeEventListener("click", abcFunc);            

        }
        </script>
</head>
<body>
    <h2>이벤트 처리 : 이벤트 핸들러 연결</h2>
    <input type="button" value="버튼1" onclick="func1()"><br>
    <input type="button" value="버튼2" onclick="b.funcNew1()"><br>
    <input type="button" value="버튼3" onclick="b.functNew2()"><br>
    <hr>
    <!-- <button id="btn1" onclick="이벤트처리함수()">클릭1</button><br> -->
    <button id="btn1" >클릭1</button><br>
    <button id="btn2" name="myBtn">클릭2</button><br>
    <button id="btn3" name="myBtn">클릭3</button><br>
    <button id="btn4">클릭4</button><br>
    <button id="btn5">클릭5</button><br>
    <div id="show"></div>   <!-- 영역 확보 -->
</body>
</html>
