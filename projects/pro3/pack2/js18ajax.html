<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- axios cdn -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h3>Ajax 3가지 방식 비교</h3>
    <button id="btn1">1) fetch then</button>
    <button id="btn2">2) async fetch</button>
    <button id="btn3">3) axios</button>
    <hr>
    <div id="result"></div>

    <script>
        window.onload = () => {
            document.querySelector("#btn1").onclick = funcFetch; 
            document.querySelector("#btn2").onclick = funcAsync; 
            document.querySelector("#btn3").onclick = funcAxios; 
        }

        // 1. fetch + then
        function funcFetch() {
            fetch("sangpum.json")
                .then(response => {
                    if(!response.ok){
                        throw new Error("서버 오류");
                    }
                    return response.json();
            })
            .then(data => {
                let output = "<b>fetch then 결과</b><br>";
                data.forEach(item => {
                    output += "코드 : " + item.code + " / 품명 : " + item.sang + "<br>";
                });
                document.querySelector("#result").innerHTML = output;
            })
            .catch(error => {
                document.querySelector("#result").innerHTML = "에러 발생 : " + error;
            })
        }

        // 2. Async + await fetch
        async function funcAsync() {
            try{
                const response = await fetch("sangpum.json");

                if(!response.ok){
                    throw new Error("서버 오류");
                }

                const data = await response.json();
                let output = "<b>async fetch 결과</b><br>";
                data.forEach(item => {
                    output += "코드 : " + item.code + " / 품명 : " + item.sang + "<br>";
                });
                document.querySelector("#result").innerHTML = output;

            } catch(error) {
                document.querySelector("#result").innerHTML = "에러 발생 : " + error;
            }
        }

        // 3. Axios
        // 단점 : 모듈을 꼭 읽어와야 함
        async function funcAxios() {
            try{
                const response = await axios.get("sangpum.json");
                const data = response.data;     // json 처리를 자동으로 해준다.
                let output = "<b>axios 결과</b><br>";
                data.forEach(item => {
                    output += "코드 : " + item.code + " / 품명 : " + item.sang + "<br>";
                });
                document.querySelector("#result").innerHTML = output;


            }catch (error){
                document.querySelector("#result").innerHTML = "에러 발생 : " + error;
            }
        }

    </script>
</body>
</html>
