<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    ----변수와 연산자----<br>
    <script type="text/javascript">
        // var aa;     // 전통적인 변수 선언 방식
        let aa;     // 모던(modern)한 변수 선언
        aa = 100;
        // document.write(aa);
        let bb = 20.5;
        const cc = 300;     // 상수로 선언
        bb = bb + 10;   
        // cc = cc + 10;    // err : 수정 불가
        let dd = false;
        let msg = "변수 선언 이해";
        document.write(aa, " ", bb, " ", cc, " ", dd, " ", msg);
        document.write("<hr>")
        document.write("type 확인 : ", typeof(1), ' ', typeof(-1.5), ' ', typeof("안녕"), ' ', typeof(true), ' ', typeof(null), ' ', typeof(undefined));

        {   // 영역 확보
            let v1 = 1;
            document.write("<br>", v1)
            {
                let v2 = 2;
                {
                    let v3 = 3;
                    document.write("<br>", v1, ' ', v2, ' ', v3);   // Uncaught ReferenceError: v1 is not defined

                }
            }
        }
        // document.write("<br>", v1, ' ', v2, ' ', v3);   // Uncaught ReferenceError: v1 is not defined
    </script>

    <br>-- 연산자 --<br>
    <script>
        let x = 5; y = 2;
        document.write("<br>", x, " ", y);
        document.write("<br>산술 연산 : ", x+y, " ", x / y, " ", x % y);
        document.write("<br>비교 연산 : ", x>y, " ", x <= y, " ", x == y, " ", x != y);
        document.write("<br>논리 연산(&&-and, ||-or) : ", x>y && x <= y, " ", x == y || x != y);
        document.write("<br>누적 연산 : ", x=x+1, " ", x += 1, " ", ++x);
        document.write(x++);
        document.write("<br>삼항 연산 : ", (x>y)?1000:1000+2000);
        // 연산자 우선순위는 Python과 동인
        document.write("<br>" + "a" + "b" + "c");   // 문자열 더하기
        let m, b, c;
        m = b = c = 6 + 5;  // 할당 연상 체이닝
        document.write("<br>", m, " ", b, " ", c);

    </script>
</body>
</html>
