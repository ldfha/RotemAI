<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    조건 판단문 : if<br>
    <script>
        // let ave = prompt("평균 점수 입력 : ", "80");
        // document.write("ave : ", ave);
        let ave = 85;
        if(ave >= 90) 
            document.write("점수 : " + ave + "이므로 <b style='color:blue'>우수</b>");
        else if(ave >= 70)
            document.write("점수 : " + ave + "이므로 <b style='color:cyan'>보통</b>");
        else
            document.write("점수 : " + ave + "이므로 <b style='color:red'>저조</b>");
    </script>

    <br>조건 판단문 : switch<br>
    <script>
        let result="D";

        switch(result){
            case "A":{
                document.write("매우 우수");
                break;
            }
            case "B":document.write("우수"); break;
            case "C":document.write("보통"); break;
            // case "D":document.write("저조"); break;
            case "D":
            case "F":document.write("불량"); break;
            default:document.write("기타");
        }
    </script>
</body>
</html>
