<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>edit form</title>
</head>
<body>
<h2>* 상품 수정 *</h2>
<!-- flash 메세지 출력 관련 코드 -->
{% if messages %}
    <ul>
        {% for m in messages %}
        <li>{{m}}</li>
        {% endfor %}
    </ul>
{% endif %}

<form action="{{url_for('edit_save', code=row.code)}}" method="post">
    <p>코드 : <b>{{row.code}}</b> (pk는 수정 X)</p>
    <p>품명 : <input name="sang" id="sang" value="{{row.sang}}"></p>
    <p>수량 : <input value="{{row.su}}" name="su" id="su"></p>
    <p>단가 : <input value="{{row.dan}}" name="dan" id="dan"></p>
    <button type="submit">수정</button>
    <a href="{{url_for('show_list')}}">취소</a>
</form>
</body>
</html>
