<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>직원 자료, 직급별 연봉 통계</h2>
    <form action="/dbshow" method="get">
        <label for="dept">부서명 : </label>
        <input type="text" id="dept" name="dept" placeholder="총무부">

        <button type="submit">조회</button>
        <a href="/">메인 페이지</a>
    </form>

    <hr>
    <h3>직원 목록</h3>
    {{jikwondata | safe}}
    <h3>직급별 연봉 통계(평균 / 표준편차 / 인원수)</h3>
    {{statsdata | safe}}
    <h3>그래프</h3>
    <img src="{{img_src}}">
    <h3>성별, 직급별 빈도표</h3>
    {{ctab | safe}}
    <h3>부서별 최고 연봉자</h3>
    {{result | safe}}
    <h3>부서별 직원 비율</h3>
    {{dept_ratio | safe}}
</body>
</html>
